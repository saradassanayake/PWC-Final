<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notebook</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    #notebook-wrap {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: min(480px, 85vw);
      container-type: inline-size;
    }

    #notebook-wrap > img {
      display: block;
      width: 100%;
      height: auto;
    }

    .nb-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    .nb-field {
      position: absolute;
      background: transparent;
      border: none;
      outline: none;
      color: #444;
      caret-color: #F05423;
      font-family: 'Biro Script', cursive;
      transform: translateY(-50%);
      pointer-events: all;
    }

    .nb-field::placeholder {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      color: #ccc;
      font-size: clamp(10px, 2.4cqw, 14px);
    }

    /* Title of Journal */
    .nb-title {
      position: absolute;
      pointer-events: all;
      background: transparent;
      outline: none;
      color: #333;
      caret-color: #F05423;
      font-family: 'Biro Script', cursive;
      font-size: clamp(17px, 4.5cqw, 27px);
      font-weight: 600;
      transform: translateY(-50%);
      top: 17%;
      left: 15%;
      width: 50%;
    }

    .nb-title:empty::before {
      content: attr(data-placeholder);
      color: #bbb;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-weight: 400;
      font-size: clamp(16px, 3.5cqw, 23px);
    }

    .nb-task {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-weight: 400;
      font-size: clamp(20px, 3cqw, 20px);
      width: 42%;
    }

    .nb-int {
      font-size: clamp(14px, 3cqw, 20px);
      width: 14%;
      text-align: center;
    }

    .nb-int::-webkit-outer-spin-button,
    .nb-int::-webkit-inner-spin-button {
      -webkit-appearance: none;
    }
    
    #greeting {
      position: fixed;
      top: 20px;
      right: 20px;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 12px;
      color: #A54D30;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <img id="corner-logo" src="Logo and Status (mock).svg" alt="Logo and Status" />

  <div id="greeting"></div>

  <!-- bg -->
  <svg id="page-bg" viewBox="0 0 1440 1024" preserveAspectRatio="xMidYMid slice"
       xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="720" cy="1050" rx="1320" ry="545" fill="white"/>
  </svg>

  <div id="notebook-wrap">
    <img src="Notebook Svg File.svg" alt="Notebook" />

    <div class="nb-overlay">

      <!-- Title -->
      <div
        class="nb-title"
        contenteditable="true"
        spellcheck="false"
        data-placeholder="Untitled List"
      ></div>

      <!-- Task 1 -->
      <input class="nb-field nb-task" style="top:32.5%; left:15%"
             type="text" placeholder="Type Task 1" maxlength="40" />
      <input class="nb-field nb-int"  style="top:32.5%; left:62%"
             type="number" placeholder="—" min="1" max="5" />

      <!-- Task 2 -->
      <input class="nb-field nb-task" style="top:46.7%; left:15%"
             type="text" placeholder="Type Task 2" maxlength="40" />
      <input class="nb-field nb-int"  style="top:46.7%; left:62%"
             type="number" placeholder="—" min="1" max="5" />

      <!-- Task 3 -->
      <input class="nb-field nb-task" style="top:56.6%; left:15%"
             type="text" placeholder="Type Task 3" maxlength="40" />
      <input class="nb-field nb-int"  style="top:56.6%; left:62%"
             type="number" placeholder="—" min="1" max="5" />

      <!-- Task 4 -->
      <input class="nb-field nb-task" style="top:66.3%; left:15%"
             type="text" placeholder="Type Task 4" maxlength="40" />
      <input class="nb-field nb-int"  style="top:66.3%; left:62%"
             type="number" placeholder="—" min="1" max="5" />

      <!-- Task 5 -->
      <input class="nb-field nb-task" style="top:76.2%; left:15%"
             type="text" placeholder="Type Task 5" maxlength="40" />
      <input class="nb-field nb-int"  style="top:76.2%; left:62%"
             type="number" placeholder="—" min="1" max="5" />

    </div>
  </div>

  <script>
    const name = localStorage.getItem('name') || '';
    document.getElementById('greeting').textContent = 'Hello, ' + name;
  </script>
</body>
</html>
