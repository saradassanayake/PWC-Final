<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Name Tag</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <img id="corner-logo" src="Logo and Status (mock).svg" alt="Logo and Status" />

  <!-- Page background: large white ellipse rising from bottom -->
  <svg id="page-bg" viewBox="0 0 1440 1024" preserveAspectRatio="xMidYMid slice"
       xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="720" cy="1050" rx="1320" ry="545" fill="white"/>
  </svg>

  <!-- ── Nametag ── -->
  <div id="nametag">

    <svg viewBox="0 0 310 205" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <clipPath id="cardClip">
          <rect width="310" height="205" rx="16"/>
        </clipPath>
      </defs>

      <!-- White part of tag -->
      <rect width="310" height="205" rx="16" fill="white"/>
      <!-- orange part of tag (top) -->
      <rect width="310" height="68" fill="#F05423" clip-path="url(#cardClip)"/>
      <!-- orange part of tag (bottom) -->
      <rect y="187" width="310" height="18" fill="#F05423" clip-path="url(#cardClip)"/>

      <!-- Nametag "HELLO" -->
      <text x="155" y="35"
            text-anchor="middle"
            font-family="'Helvetica Neue', Arial, sans-serif"
            font-size="25" font-weight="700" letter-spacing="1"
            fill="white">HELLO</text>

      <!-- Nametag "my name is" -->
      <text x="155" y="59"
            text-anchor="middle"
            font-family="'Helvetica Neue', Arial, sans-serif"
            font-size="11" font-weight="400" letter-spacing="1.5"
            fill="white">my name is</text>
    </svg>

    <!-- Click Enter -->
    <div class="name-overlay">
      <div
        id="nameInput"
        class="name-input"
        contenteditable="true"
        spellcheck="false"
        data-placeholder="[Enter]"
      ></div>
    </div>

    <span class="clickEnter" id="clickEnter">Click "Enter" to Confirm</span>
  </div>

  <script>
    // ── Nametag position editor (to move the nametag and all its parts together to a different pos.)─────────>
  
    const NAMETAG = { x: '50%', y: '47%' };
    // ──────────────────────────────────────────────────────────────
    const nametag = document.getElementById('nametag');
    nametag.style.left = NAMETAG.x;
    nametag.style.top  = NAMETAG.y;

    const input = document.getElementById('nameInput');
    const clickEnter = document.getElementById('clickEnter');

    input.focus();

    input.addEventListener('input', () => {
      clickEnter.classList.toggle('visible', input.textContent.trim().length > 0);
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const name = input.textContent.trim();
        if (!name) return;
        localStorage.setItem('name', name);
        window.location.href = 'divider.html';
      }
    });
  </script>
</body>
</html>
